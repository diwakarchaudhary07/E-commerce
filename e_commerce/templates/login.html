{% extends 'base.html' %}
{% load static %}

{% block title %}Login | Easy Kart{% endblock %}

{% block header_banner %}
  <div class="mb-4">
    <img src="{% static 'assets/banners/banner1.jpg' %}" class="img-fluid w-100" alt="Banner" style="max-height: 300px; object-fit: cover;">
  </div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Login</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="send_otp">
                    <div class="mb-3">
                        <label for="otp_email" class="form-label">Email for OTP login</label>
                        <input type="email" class="form-control" id="otp_email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-secondary">Send OTP</button>
                </form>
                <div class="mt-3">
                    <a href="{% url 'register' %}">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

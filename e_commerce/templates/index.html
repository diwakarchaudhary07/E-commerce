{% extends 'base.html' %}
{% load static %}

{% block title %}Home - Easy Kart{% endblock %}

{% block extra_head %}
<style>
  #heroBanner {
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    min-height: 100vh;
    overflow: hidden;
    margin-bottom: 2rem;
    z-index: 0;
  }
  #heroBanner .carousel-item,
  #heroBanner .carousel-item img {
    width: 100%;
    min-height: 100vh;
  }
  #heroBanner .carousel-item img {
    object-fit: cover;
  }
  @media (max-width: 768px) {
    #heroBanner {
      min-height: 70vh;
    }
    #heroBanner .carousel-item,
    #heroBanner .carousel-item img {
      min-height: 70vh;
    }
  }
</style>
{% endblock %}

{% block content %}
  <div id="heroBanner" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="2" aria-label="Slide 3"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="3" aria-label="Slide 4"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="{% static 'assets/Banner1.png' %}" class="d-block w-100" alt="Banner 1">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/Banner2.png' %}" class="d-block w-100" alt="Banner 2">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/Banner3.jpeg' %}" class="d-block w-100" alt="Banner 3">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/Banner4.png' %}" class="d-block w-100" alt="Banner 4">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#heroBanner" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroBanner" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Welcome to Easy Kart</h1>
      <p class="col-md-8 fs-4">A simple demo storefront using Bootstrap components. Browse featured products below.</p>
      <a class="btn btn-primary btn-lg" href="{% url 'product' %}" role="button">Shop Now</a>
    </div>
  </div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Home - Easy Kart{% endblock %}

{% block extra_head %}
<style>
  #heroBanner {
    width: 100vw;
    height: 60vh;
    margin-left: calc(-50vw + 50%);
    margin-bottom: 2rem;
  }
  #heroBanner .carousel-inner {
    height: 100%;
  }
  #heroBanner .carousel-item {
    height: 100%;
  }
  #heroBanner .carousel-item img {
    height: 100%;
    object-fit: cover;
  }
</style>
{% endblock %}

{% block content %}
  <!-- Hero Banner Section with Carousel -->
  <div id="heroBanner" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="0" class="active" aria-current="true"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="{% static 'assets/banner1.jpg' %}" class="d-block w-100" alt="Unlock Your Advantage">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/banner2.jpg' %}" class="d-block w-100" alt="Maximize Your Value">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/banner3.jpg' %}" class="d-block w-100" alt="Exclusive Deals">
      </div>
      <div class="carousel-item">
        <img src="{% static 'assets/banner4.jpg' %}" class="d-block w-100" alt="Unlock Your Potential">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#heroBanner" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroBanner" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- Welcome Section -->
  <div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Welcome to Easy Kart</h1>
      <p class="col-md-8 fs-4">A simple demo storefront using Bootstrap components. Browse featured products below.</p>
      <a class="btn btn-primary btn-lg" href="{% url 'product' %}" role="button">Shop Now</a>
    </div>
  </div> 
      
{% endblock %}
